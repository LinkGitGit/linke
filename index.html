<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>扫码记录</title>
    <style>
        /* 页面整体样式 */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f4f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #333;
        }

        /* 中间文字样式 */
        .center-content {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            padding: 30px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05); /* 阴影更柔和 */
            transform: translateY(-40px); /* 整体稍微往上移一点，避免显得拥挤 */
        }

        /* 强调数字的样式 */
        .highlight {
            color: #007AFF; /* 苹果蓝 */
            font-size: 40px; /* 数字再放大一点，更霸气 */
            margin: 0 8px;
        }

        /* --- 底部区域新样式 --- */
        .bottom-container {
            position: absolute;
            bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 醒目的北京时间（悬浮胶囊风格） */
        .time-display {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            background: #ffffff;
            padding: 12px 24px;
            border-radius: 30px; /* 圆角 */
            box-shadow: 0 4px 16px rgba(0,0,0,0.08); /* 悬浮阴影 */
            margin-bottom: 15px; /* 和最下面文字的间距 */
            border: 1px solid #eaeaea;
        }
        
        /* 独立控制时间数字的颜色 */
        .time-display span {
            color: #FF3B30; /* 苹果红，极具警示和醒目感 */
            font-family: monospace; /* 等宽字体，秒数跳动时不会左右乱晃 */
            font-size: 18px;
            margin-left: 5px;
        }

        /* 新增的一行专属文字样式 */
        .footer-text {
            font-size: 15px;
            color: #888;
            font-weight: 800;
            letter-spacing: 2px; /* 增加字间距，更有质感 */
        }
    </style>
</head>
<body>

    <!-- 屏幕中间显示区域 -->
    <div class="center-content">
        这是您今天第<span id="scanCount" class="highlight">0</span>次扫码
    </div>

    <!-- 屏幕下方显示区域 -->
    <div class="bottom-container">
        <!-- 变得更醒目的北京时间 -->
        <div id="bjTime" class="time-display">北京时间：<span>加载中...</span></div>
        <!-- 你要求新增的一行字 -->
        <div class="footer-text">MTAK EDC SHOW 2026</div>
    </div>

    <script>
        // 1. 获取并格式化当前北京时间的日期
        function getBeijingDate() {
            const now = new Date();
            return new Intl.DateTimeFormat('zh-CN', {
                timeZone: 'Asia/Shanghai',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            }).format(now).replace(/\//g, '-');
        }

        // 2. 扫码次数统计逻辑
        function updateScanCount() {
            const today = getBeijingDate();
            let storedDate = localStorage.getItem('lastScanDate');
            let count = localStorage.getItem('todayScanCount');

            if (storedDate === today) {
                count = parseInt(count || 0) + 1;
            } else {
                count = 1;
                localStorage.setItem('lastScanDate', today);
            }

            localStorage.setItem('todayScanCount', count);
            document.getElementById('scanCount').innerText = count;
        }

        // 3. 更新屏幕下方的北京时间（带高亮样式）
        function updateBeijingTime() {
            const now = new Date();
            const timeString = new Intl.DateTimeFormat('zh-CN', {
                timeZone: 'Asia/Shanghai',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false // 24小时制
            }).format(now);
            
            // 注意这里：把时间字符串用 span 包裹起来，触发 CSS 里配置的红色字体和等宽效果
            document.getElementById('bjTime').innerHTML = `北京时间：<span>${timeString}</span>`;
        }

        // 初始化执行
        updateScanCount(); 
        updateBeijingTime(); 
        setInterval(updateBeijingTime, 1000); 
    </script>
</body>
</html>
